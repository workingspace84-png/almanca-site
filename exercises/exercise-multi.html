<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Multiple Choice Übung</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="header-placeholder"></div>

<div class="exercise-wrapper">
  <div class="exercise-container">

    <h2 class="exercise-title">Multiple Choice</h2>

    <p id="question"></p>

    <div id="options"></div>

    <button id="nextBtn" style="display:none;">Sonraki</button>

    <p id="feedback"></p>
    <p id="score"></p>

  </div>
</div>

<footer>
  <p>&copy; 2025 Mein Deutsch Study Hall</p>
</footer>

<script>
fetch('../header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });
</script>

<script src="../js/header.js"></script>

<script>
  window.EXERCISE_DATA = './exercise-multi.json';
</script>

<script src="../js/exercises-multi.js"></script>

</body>
</html>
