<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Präpositionen Übung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="exercise-wrapper">
  <div class="exercise-container">

    <h2>Präpositionen Übung</h2>

    <p id="question">Yükleniyor...</p>

    <input type="text" id="answerInput" placeholder="Cevabını yaz" autocomplete="off">

    <div class="special-chars">
      <button type="button" onclick="insertChar('ü')">ü</button>
      <button type="button" onclick="insertChar('ö')">ö</button>
      <button type="button" onclick="insertChar('ä')">ä</button>
      <button type="button" onclick="insertChar('ß')">ß</button>
    </div>

    <button id="submitBtn">Cevabı Kontrol Et</button>

    <p id="feedback"></p>
    <p id="score"></p>

  </div>
</div>

<script src="../script.js"></script>

<script>
function insertChar(char) {
  const input = document.getElementById('answerInput');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  input.value = text.slice(0, start) + char + text.slice(end);
  input.focus();
  input.setSelectionRange(start + 1, start + 1);
}
</script>

</body>
</html>
