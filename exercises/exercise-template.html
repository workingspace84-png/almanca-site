<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- ANA İÇERİK -->
<div class="exercise-wrapper">
  <div class="exercise-container">
    <h2 class="exercise-title">{{TITLE}}</h2>
    <p id="question">
      {{QUESTION}}<br>
      <em>{{TRANSLATION}}</em>
    </p>

    <input type="text" id="answerInput" placeholder="Antwort hier eingeben...">
    <button id="submitBtn">Check</button>
    <p id="feedback"></p>
    <p id="explanation">{{EXPLANATION}}</p>
    <p id="score"></p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>&copy; 2025 Mein Deutsch Study Hall</p>
</footer>

<!-- HEADER FETCH -->
<script>
fetch('../header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });
</script>

<script src="../js/header.js"></script>
<script src="../js/script.js"></script>

</body>
</html>
