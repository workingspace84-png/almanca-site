<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- ANA İÇERİK -->
<div class="exercise-wrapper">
  <div class="exercise-container">
    <h2 class="exercise-title">{{TITLE}}</h2>
    <p id="question">
      {{QUESTION}}<br>
      <em>{{TRANSLATION}}</em>
    </p>

    <!-- Özel karakter paneli -->
    <div id="special-chars">
      <button type="button" class="char-btn">ä</button>
      <button type="button" class="char-btn">ö</button>
      <button type="button" class="char-btn">ü</button>
      <button type="button" class="char-btn">ß</button>
    </div>

    <input type="text" id="answerInput" placeholder="Antwort hier eingeben...">
    <button id="submitBtn">Check</button>
    <p id="feedback"></p>
    <p id="explanation">{{EXPLANATION}}</p>
    <p id="score"></p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>&copy; 2025 Mein Deutsch Study Hall</p>
</footer>

<!-- HEADER FETCH -->
<script>
fetch('../header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });
</script>

<script src="../js/header.js"></script>
<script src="../script.js"></script>

<!-- ÖZEL KARAKTER PANELİ JS -->
<script>
const input = document.getElementById('answerInput');
document.querySelectorAll('.char-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const char = btn.textContent;
    const start = input.selectionStart;
    const end = input.selectionEnd;
    input.value = input.value.slice(0, start) + char + input.value.slice(end);
    input.focus();
    input.selectionStart = input.selectionEnd = start + 1;
  });
});
</script>

<!-- EXERCISE JS -->
<script>
const submitBtn = document.getElementById('submitBtn');

answerInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    submitAnswer();
  }
});

submitBtn.addEventListener('click', submitAnswer);

function submitAnswer() {
  const answer = answerInput.value.trim();
  const feedback = document.getElementById('feedback');
  const score = document.getElementById('score');

  const correctAnswer = "{{CORRECT_ANSWER}}";

  if (answer.toLowerCase() === correctAnswer.toLowerCase()) {
    feedback.textContent = 'Richtig! ✅';
  } else {
    feedback.textContent = 'Falsch ❌';
  }

  answerInput.value = '';
}
</script>

<style>
#special-chars {
  margin: 10px 0;
}
.char-btn {
  font-size: 18px;
  margin: 2px;
  padding: 4px 8px;
  cursor: pointer;
}
</style>

</body>
</html>
