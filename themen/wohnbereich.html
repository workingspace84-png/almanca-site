<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Neue Seite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- ANA İÇERİK -->
<div class="content-wrapper">
  <div class="content-container">

    <h2 class="page-title">Neue Seite</h2>
    <p>Bu sayfa şu an boş. Buraya istediğiniz içerikleri ekleyebilirsiniz.</p>

  </div>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<!-- SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  // Dinamik header yükle
  fetch('../header.html')
    .then(response => response.text())
    .then(data => {
      const headerPlaceholder = document.getElementById('header-placeholder');
      if(headerPlaceholder) headerPlaceholder.innerHTML = data;

      // Hamburger menüyü aktif et
      const menuIcon = document.querySelector('#header-placeholder .menu-icon');
      const menu = document.querySelector('#header-placeholder #menu');
      if(menuIcon && menu) {
        menuIcon.addEventListener('click', () => {
          menu.classList.toggle('hidden');
        });
      }
    });

  // Dinamik footer yükle
  fetch('../footer.html')
    .then(response => response.text())
    .then(data => {
      const footerPlaceholder = document.getElementById('footer-placeholder');
      if(footerPlaceholder) footerPlaceholder.innerHTML = data;
    });

});
</script>

</body>
</html>
