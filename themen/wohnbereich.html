<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Neue Seite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Stil dosyası, yeni sayfa kendi klasöründe olduğundan ../ ile bir üst klasöre çık -->
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- ANA İÇERİK -->
<div class="content-wrapper">
  <div class="content-container">

    <h2 class="page-title">Neue Seite</h2>

    <p>Bu sayfa şu an boş. Buraya istediğiniz içerikleri ekleyebilirsiniz.</p>

    <!-- ÖZEL KARAKTERLER BUTONLARI (opsiyonel, istersen kaldırabilirsin) -->
    <div class="special-chars">
      <button type="button" onclick="insertChar('ü')">ü</button>
      <button type="button" onclick="insertChar('ö')">ö</button>
      <button type="button" onclick="insertChar('ä')">ä</button>
      <button type="button" onclick="insertChar('ß')">ß</button>
    </div>

    <!-- Giriş alanı (opsiyonel) -->
    <input type="text" id="textInput" placeholder="Yazınız..." autocomplete="off">

  </div>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<!-- SCRIPT DOSYASI -->
<script src="../script.js"></script>

<script>
function insertChar(char) {
  const input = document.getElementById('textInput');
  if (!input) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  input.value = text.slice(0, start) + char + text.slice(end);
  input.focus();
  input.setSelectionRange(start + 1, start + 1);
}

// Enter tuşu ile bir işlem yapmak istersen buraya ekleyebilirsin
document.getElementById("textInput")?.addEventListener("keydown", function (event) {
  if (event.key === "Enter") {
    event.preventDefault();
    alert("Enter tuşuna basıldı!"); // veya istediğin işlem
  }
});
</script>

</body>
</html>
