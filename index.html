<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

<body>

<!-- HEADER PLACEHOLDER -->
<div id="header-placeholder"></div>

<main>
  <div class="themen-container">
    <div class="thema"><h2>Verben</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Nomen und Artikel</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Adjektive</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Pronomen</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Präpositionen</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Fragen</h2><ul><li><a href="#">Übungen</a></li></ul></div>
    <div class="thema"><h2>Satzstellung</h2><ul><li><a href="#">Übungen</a></li></ul></div>

  </div>
</main>

<footer>
  <p>&copy; 2025 Mein Deutsch Study Hall</p>
</footer>

<script>
/* -------------------- */
/* HEADER DİNAMİK YÜKLEME */
/* -------------------- */
fetch('header.html') // header.html dosyanın yolu, index.html ile aynı dizindeyse sadece 'header.html'
  .then(response => response.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
    
    // Hamburger menü toggle fonksiyonu header yüklenince aktif olsun
    const menuIcon = document.querySelector('#header-placeholder .menu-icon');
    const menu = document.querySelector('#header-placeholder #menu');
    menuIcon.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  })
  .catch(err => console.error('Header yüklenirken hata oluştu:', err));
</script>

</body>
</html>
