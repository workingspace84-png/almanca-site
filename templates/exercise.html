{% extends "base.html" %}

{% block title %}{{ exercise_title }} – {{ level_key }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/exercise.css') }}?v={{ asset_hash('css/exercise.css') }}">
{% endblock %}

{% block content %}

<h2 class="exercise-page-title">{{ level_key }} – {{ exercise_title }}</h2>

<div class="exercise-wrapper">
  <div class="exercise-container">

    <p id="question"></p>

    <div id="options"></div>

    <button id="nextBtn" style="display:none;">Next Question</button>

    <div id="feedback"></div>

    <p id="score"></p>

  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  window.LANGUAGE   = "{{ lang }}";
  window.EXERCISE_DATA = "/api/exercises/{{ level_key }}/{{ exercise_key }}";

  window.I18N = {
    nextButton:       "{{ 'Next Question' | translate(lang) }}",
    completedMessage: "{{ 'All exercises completed!' | translate(lang) }}"
  };
</script>

<script src="{{ url_for('static', filename='js/exercises.js') }}?v={{ asset_hash('js/exercises.js') }}"></script>
{% endblock %}
